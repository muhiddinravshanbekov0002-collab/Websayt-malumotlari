<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Grill App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        h1 { color: #2d3436; text-align: center; font-size: 24px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .item img { width: 100%; border-radius: 8px; height: 100px; object-fit: cover; }
        .item h3 { font-size: 16px; margin: 8px 0; }
        .price { color: #e67e22; font-weight: bold; margin-bottom: 8px; }
        button { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Burger Grill 🍔</h1>
    <div class="container">
        <div class="item">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" alt="Cheeseburger">
            <h3>Cheeseburger</h3>
            <div class="price">35,000 so'm</div>
            <button onclick="addToCart('Cheeseburger', 35000)">Qo'shish</button>
        </div>
        <div class="item">
            <img src="https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=200" alt="Double Burger">
            <h3>Double Burger</h3>
            <div class="price">48,000 so'm</div>
            <button onclick="addToCart('Double Burger', 48000)">Qo'shish</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = [];
        tg.expand();

        function addToCart(name, price) {
            cart.push({name, price});
            updateMainButton();
        }

        function updateMainButton() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            if (total > 0) {
                tg.MainButton.setText(`BUYURTMA BERISH: ${total.toLocaleString()} so'm`);
                tg.MainButton.show();
            }
        }

        tg.onEvent('mainButtonClicked', function() {
            // Tanlangan mahsulotlarni matn ko'rinishida yig'amiz
            let orderDetails = cart.map(i => i.name).join(", ");
            tg.sendData("Buyurtma: " + orderDetails);
        });
    </script>
</body>
</html>
